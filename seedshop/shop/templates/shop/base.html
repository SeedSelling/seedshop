<!DOCTYPE html>
<html>
<head>
    <title>Online Seed Booking System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
        .navbar { background: #2e7d32; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .navbar a:hover { text-decoration: underline; }
        
        /* Sidebar Styles */
        .sidebar { float: left; width: 220px; background: #e8f5e8; height: calc(100vh - 60px); padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .sidebar h3 { color: #2e7d32; margin-top: 0; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { margin: 10px 0; }
        .sidebar a { text-decoration: none; color: #2e7d32; font-weight: bold; display: block; padding: 8px; background: white; border-radius: 5px; border-left: 4px solid #2e7d32; }
        .sidebar a:hover { background: #2e7d32; color: white; }
        
        /* Main Content */
        .main-container { margin-left: 240px; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 20px; box-shadow: 0 0 8px rgba(0, 0, 0, 0.1); }
        table.simple-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        table.simple-table th, table.simple-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        table.simple-table th { background-color: #e0f2f1; }
        table.simple-table tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <div class="navbar">
    <div>🌾 Seed Booking</div>
    <div>
        <a href="/">Home</a>
        <a href="/search/">🔍 Search</a>
        <a href="/admin/">👨‍🌾 Admin</a>
    </div>
</div>
    
    <div class="sidebar">
    <h3>Quick Actions</h3>
    <ul>
        <li><a href="/search/">🔍 Seeds List</a></li>
        <li><a href="/booking/">📋 My Bookings</a></li>
        <li><a href="/admin/">👨‍🌾 Admin</a></li>
        <li><a href="/bookings/">📋 Bookings List</a></li>
        <li><a href="/my-bookings/">👤 Search Bookings Details</a></li>
    </ul>
</div>
    
    <div class="main-container">
        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</body>
</html>
