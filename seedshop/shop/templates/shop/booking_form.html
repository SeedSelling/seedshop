{% extends 'shop/base.html' %}

{% block content %}
<h1>Seed Booking Form</h1>

<form method="post">
    {% csrf_token %}
    <label>Farmer Name:</label><br>
    <input type="text" name="farmer_name" required><br><br>

    <label>Aadhar Card No*:</label><br>  <!-- ← PHONE HATAKE ADHAR -->
    <input type="text" name="aadhar_no" placeholder="1234-5678-9012" required><br><br>

    <label>Phone:</label><br>
    <input type="text" name="phone"><br><br>  <!-- ← Optional banaya -->

    <label>Address:</label><br>
    <input type="text" name="address" required><br><br>
    
    <label>Select Seed Variety:</label><br>
    <select name="seed_id" required>
        <option value="">-- Select --</option>
        {% for seed in seeds %}
        <option value="{{ seed.id }}">
            {{ seed.category }} - {{ seed.name }} (₹{{ seed.price }} /kg)
        </option>
        {% endfor %}
    </select><br><br>

    <label>Quantity (kg):</label><br>
    <input type="number" name="quantity" min="1" required><br><br>

    <button type="submit">Book Now</button>
</form>
{% endblock %}
