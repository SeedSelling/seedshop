{% extends 'base.html' %}
{% block content %}
<h2>Book {{ seed.name }}</h2>
<form method="post">
    {% csrf_token %}
    <p>Price: ₹{{ seed.price }}/kg</p>
    <p>Available: {{ seed.stock }} kg</p>
    <input type="number" name="quantity" min="1" max="{{ seed.stock }}" required>
    <button type="submit">Book Now</button>
</form>
{% endblock %}
